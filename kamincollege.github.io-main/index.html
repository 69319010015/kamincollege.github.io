<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มลงทะเบียน</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="body-background"></div>
    <div class="container">
        <h1>แบบฟอร์มลงทะเบียน</h1>
        <p>งานสัมมนาประจำปี 2024: นวัตกรรมดิจิทัลเพื่ออนาคต</p>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner" style="display: none;">
            <div class="spinner"></div>
            <p>กำลังบันทึกข้อมูล...</p>
        </div>

        <!-- Notification Container -->
        <div id="notificationContainer"></div>

        <form id="registrationForm">
            <!-- Section 1: ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>ข้อมูลส่วนบุคคล</legend>
                <div class="form-group">
                    <label for="title"><i class="fas fa-user-tag"></i> คำนำหน้าชื่อ (Title)</label>
                    <select id="title" name="title" required>
                        <option value="">-- กรุณาเลือก --</option>
                        <option value="นาย">นาย (Mr.)</option>
                        <option value="นาง">นาง (Mrs.)</option>
                        <option value="นางสาว">นางสาว (Ms.)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="firstname"><i class="fas fa-user"></i> ชื่อ (First Name)</label>
                    <input type="text" id="firstname" name="firstname" required>
                </div>
                <div class="form-group">
                    <label for="lastname"><i class="fas fa-user"></i> นามสกุล (Last Name)</label>
                    <input type="text" id="lastname" name="lastname" required>
                </div>
                <div class="form-group">
                    <label for="dob"><i class="fas fa-calendar-alt"></i> ปีเกิด (Date of Birth)</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> เพศ (Gender)</label>
                    <div class="radio-group" required>
                        <label><input type="radio" name="gender" value="ชาย"> ชาย (Male)</label>
                        <label><input type="radio" name="gender" value="หญิง"> หญิง (Female)</label>
                        <label><input type="radio" name="gender" value="อื่นๆ"> อื่นๆ (Other)</label>
                        <label><input type="radio" name="gender" value="ไม่ระบุ"> ไม่ระบุ (Prefer not to say)</label>
                    </div>
                </div>
            </fieldset>

            <!-- Section 2: ข้อมูลองค์กร / การศึกษา -->
            <fieldset>
                <legend>ข้อมูลองค์กร / การศึกษา</legend>
                <div class="form-group">
                    <label for="organization"><i class="fas fa-building"></i> ชื่อหน่วยงาน/บริษัท/สถาบัน (Organization/Company/Institution Name)</label>
                    <input type="text" id="organization" name="organization">
                </div>
                <div class="form-group">
                    <label for="jobtitle"><i class="fas fa-briefcase"></i> ตำแหน่งงาน (Job Title)</label>
                    <input type="text" id="jobtitle" name="jobtitle">
                </div>
                <div class="form-group">
                    <label for="department"><i class="fas fa-layer-group"></i> แผนก (Department)</label>
                    <input type="text" id="department" name="department">
                </div>
            </fieldset>

            <!-- Section 3: ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>ข้อมูลการติดต่อ</legend>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> อีเมล (Email)</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> เบอร์โทรศัพท์มือถือ (Mobile Phone Number)</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="address"><i class="fas fa-map-marker-alt"></i> ที่อยู่ (Address)</label>
                    <textarea id="address" name="address" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="province"><i class="fas fa-map-marked-alt"></i> จังหวัด (Province)</label>
                    <select id="province" name="province" required>
                        <option value="">-- กรุณาเลือกจังหวัด --</option>
                        <!-- We'll add a few Thai provinces as example, but in reality you might want all 77 -->
                        <option value="กรุงเทพมหานคร">กรุงเทพมหานคร</option>
                        <option value="เชียงใหม่">เชียงใหม่</option>
                        <option value="ภูเก็ต">ภูเก็ต</option>
                        <option value="ขอนแก่น">ขอนแก่น</option>
                        <option value="สงขลา">สงขลา</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="postalcode"><i class="fas fa-envelope-open-text"></i> รหัสไปรษณีย์ (Postal Code)</label>
                    <input type="text" id="postalcode" name="postalcode" required>
                </div>
            </fieldset>

            <!-- Section 4: ข้อมูลเฉพาะกิจ -->
            <fieldset>
                <legend>ข้อมูลเฉพาะกิจ</legend>
                <div class="form-group">
                    <label><i class="fas fa-user-check"></i> ประเภทการเข้าร่วม (Attendance Type)</label>
                    <div class="radio-group" required>
                        <label><input type="radio" name="attendance" value="ออนไลน์"> ออนไลน์ (Online)</label>
                        <label><input type="radio" name="attendance" value="ออนไซต์"> ออนไซต์ (On-site)</label>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-utensils"></i> อาหารที่ต้องการ (Dietary Requirements)</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="diet[]" value="ปกติ"> ปกติ (Regular)</label>
                        <label><input type="checkbox" name="diet[]" value="ฮาลาล"> ฮาลาล (Halal)</label>
                        <label><input type="checkbox" name="diet[]" value="เจ/มังสวิรัติ"> เจ/มังสวิรัติ (Vegetarian/Vegan)</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="allergies"><i class="fas fa-user-slash"></i> แพ้อาหาร (Food Allergies)</label>
                    <input type="text" id="allergies" name="allergies">
                </div>
                <div class="form-group">
                    <label for="tshirt"><i class="fas fa-tshirt"></i> ขนาดเสื้อ (T-Shirt Size)</label>
                    <select id="tshirt" name="tshirt" required>
                        <option value="">-- กรุณาเลือกขนาด --</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="2XL">2XL</option>
                    </select>
                </div>
            </fieldset>

            <!-- Section 5: การยอมรับและข้อตกลง -->
            <fieldset>
                <legend>การยอมรับและข้อตกลง</legend>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="terms" value="accept" required> <i class="fas fa-file-contract"></i> ข้าพเจ้ายอมรับข้อกำหนดและเงื่อนไขในการเข้าร่วมงาน</label>
                </div>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="pdpa" value="consent" required> <i class="fas fa-shield-alt"></i> ข้าพเจ้ายินยอมให้ใช้ข้อมูลส่วนบุคคลเพื่อการจัดงาน (PDPA Compliance)</label>
                </div>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="newsletter" value="yes"> <i class="fas fa-bell"></i> ยินยอมรับข่าวสารกิจกรรมทางอีเมลในอนาคต</label>
                </div>
            </fieldset>

            <button type="submit"><i class="fas fa-paper-plane"></i> ส่งแบบฟอร์มลงทะเบียน</button>
            <button type="reset"><i class="fas fa-eraser"></i> ล้างแบบฟอร์ม</button>
        </form>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
